<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFood - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #fff7ed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: #f97316;
      color: white;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    button:hover { background: #ea580c; }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sem conexao</h1>
    <p>Verifique a sua ligacao a internet e tente novamente. Os seus dados estao guardados localmente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
